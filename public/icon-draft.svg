<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient: deep indigo → violet -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0.35" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>

    <!-- Wi-Fi / check accent: cyan → indigo → purple -->
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#67e8f9"/>
      <stop offset="45%"  stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>

    <!-- Glow on Wi-Fi elements -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft ambient blur for background blobs -->
    <filter id="ambient">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
  </defs>

  <!-- ① Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)"/>

  <!-- ② Ambient glow blobs (glassmorphism atmosphere) -->
  <circle cx="320" cy="155" r="145" fill="#7c3aed" opacity="0.42" filter="url(#ambient)"/>
  <circle cx="175" cy="375" r="115" fill="#0891b2" opacity="0.28" filter="url(#ambient)"/>

  <!-- ③ Glassmorphism circle -->
  <circle cx="256" cy="256" r="186"
    fill="white" fill-opacity="0.055"
    stroke="white" stroke-opacity="0.16" stroke-width="1.5"/>

  <!-- ④ Glass top-left sheen (light reflection) -->
  <path d="M 125,150 Q 196,78 298,74"
    fill="none"
    stroke="white" stroke-opacity="0.24" stroke-width="2.5"
    stroke-linecap="round"/>

  <!-- ⑤ Wi-Fi arcs — center point: (256, 318) -->

  <!-- Outer arc  r=145 -->
  <path d="M 154,216 A 145,145 0 0,0 358,216"
    fill="none"
    stroke="url(#accentGrad)" stroke-width="21"
    stroke-linecap="round"
    filter="url(#glow)"/>

  <!-- Middle arc  r=97 -->
  <path d="M 187,249 A 97,97 0 0,0 325,249"
    fill="none"
    stroke="url(#accentGrad)" stroke-width="21"
    stroke-linecap="round"
    filter="url(#glow)"/>

  <!-- Inner arc  r=51 -->
  <path d="M 220,282 A 51,51 0 0,0 292,282"
    fill="none"
    stroke="url(#accentGrad)" stroke-width="21"
    stroke-linecap="round"
    filter="url(#glow)"/>

  <!-- ⑥ Checkmark — replaces dot, centred at (256, 318) -->
  <polyline points="234,320 250,338 279,300"
    fill="none"
    stroke="url(#accentGrad)" stroke-width="21"
    stroke-linecap="round" stroke-linejoin="round"
    filter="url(#glow)"/>
</svg>
