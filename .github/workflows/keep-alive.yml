name: Keep Render App Alive

on:
  schedule:
    - cron: '*/10 * * * *'  # 10分ごとに実行
  workflow_dispatch:  # 手動実行も可能

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping HKR App
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://hkr-app.onrender.com/login
          echo " - App is alive"
